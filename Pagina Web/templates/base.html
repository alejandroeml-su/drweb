<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Descripción de la página" />
  <meta name="author" content="WebCraft Agent" />

  <!-- Open Graph (redes sociales) -->
  <meta property="og:title" content="Título de la Página" />
  <meta property="og:description" content="Descripción para redes sociales" />
  <meta property="og:type" content="website" />

  <title>Título de la Página</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>

  <!-- Encabezado -->
  <header class="site-header">
    <nav class="nav" aria-label="Navegación principal">
      <a href="#" class="nav__logo">Logo</a>
      <ul class="nav__links">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contenido principal -->
  <main id="inicio">

    <!-- Sección Hero -->
    <section class="hero">
      <div class="container">
        <h1 class="hero__title">Título Principal</h1>
        <p class="hero__subtitle">Subtítulo o descripción breve de la página.</p>
        <a href="#contacto" class="btn btn--primary">Llamada a la Acción</a>
      </div>
    </section>

    <!-- Sección de Contenido -->
    <section id="sobre" class="section">
      <div class="container">
        <h2 class="section__title">Sobre Nosotros</h2>
        <p>Contenido de la sección aquí.</p>
      </div>
    </section>

    <!-- Sección de Contacto -->
    <section id="contacto" class="section section--alt">
      <div class="container">
        <h2 class="section__title">Contacto</h2>
        <form class="form" novalidate>
          <div class="form__group">
            <label for="nombre" class="form__label">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form__input" placeholder="Tu nombre" required />
          </div>
          <div class="form__group">
            <label for="email" class="form__label">Email</label>
            <input type="email" id="email" name="email" class="form__input" placeholder="tu@email.com" required />
          </div>
          <div class="form__group">
            <label for="mensaje" class="form__label">Mensaje</label>
            <textarea id="mensaje" name="mensaje" class="form__textarea" rows="5" placeholder="Tu mensaje..." required></textarea>
          </div>
          <button type="submit" class="btn btn--primary">Enviar Mensaje</button>
        </form>
      </div>
    </section>

  </main>

  <!-- Pie de página -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Tu Nombre. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="../assets/js/main.js"></script>
</body>
</html>
